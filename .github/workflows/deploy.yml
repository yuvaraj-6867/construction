name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reset_db:
        description: 'Drop & reseed production DB? (yes / no)'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 600s
          script: |
            cd /home/ec2-user/construction

            echo ">>> Pulling latest code..."
            git pull origin main

            echo ">>> Building Docker images..."
            docker-compose -f docker-compose.prod.yml build

            echo ">>> Restarting containers..."
            docker-compose -f docker-compose.prod.yml up -d

            sleep 5

            if [ "${{ github.event.inputs.reset_db }}" = "yes" ]; then
              echo ">>> Dropping and reseeding DB..."
              docker-compose -f docker-compose.prod.yml exec -T backend bash -c "DISABLE_DATABASE_ENVIRONMENT_CHECK=1 RAILS_ENV=production bundle exec rails db:drop db:create db:migrate db:seed"
            else
              echo ">>> Running DB migrations..."
              docker-compose -f docker-compose.prod.yml exec -T backend bundle exec rails db:migrate RAILS_ENV=production
            fi

            echo ">>> Deploy complete!"
            docker-compose -f docker-compose.prod.yml ps
